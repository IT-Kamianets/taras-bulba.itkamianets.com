name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm build

      - name: Prepare files (.nojekyll, CNAME, 404.html)
        run: |
          touch out/.nojekyll
          echo "taras-bulba.itkamianets.com" > out/CNAME
          cp out/index.html out/404.html

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Deploy to gh-pages branch using SSH
        env:
          GIT_SSH_COMMAND: 'ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd out
          git init
          git add --all .
          git commit -m "Deploy to GitHub Pages via SSH"
          git checkout -B gh-pages
          git push git@github.com:${{ github.repository }} gh-pages --force

      - name: Clean up SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa ~/.ssh/known_hosts
